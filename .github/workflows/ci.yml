name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Shell / YAML / JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell script syntax
        run: |
          echo "Checking shell scripts..."
          for f in devpods/bootstrap.sh docker-entrypoint.sh devpods/tmux-workspace.sh devpods/templates/turboflow_aliases.sh devpods/templates/statusline.sh agent-adapter/shell-integration.sh; do
            if [ -f "$f" ]; then
              bash -n "$f" && echo "  OK $f" || { echo "  FAIL $f"; exit 1; }
            fi
          done

      - name: YAML validation
        run: |
          python3 -c "import yaml; yaml.safe_load(open('devpods/Taskfile.yml')); print('OK Taskfile.yml')"
          python3 -c "import yaml; yaml.safe_load(open('docker-compose.yml')); print('OK docker-compose.yml')"

      - name: JSON validation
        run: |
          python3 -c "import json; json.load(open('devpods/devbox.json')); print('OK devbox.json')"
          python3 -c "import json; json.load(open('.devcontainer/devcontainer.json')); print('OK devcontainer.json')"
          python3 -c "import json; json.load(open('devpods/devcontainer_files/rackspace_devcontainer.json')); print('OK rackspace_devcontainer.json')"

      - name: Dockerfile lint
        run: docker build --check -f Dockerfile . 2>/dev/null || echo "Docker --check not supported, skipping lint"

      - name: No stale script references
        run: |
          echo "Checking for stale references to deleted scripts..."
          STALE=$(grep -rl 'devpods/setup\.sh\|devpods/post-setup\.sh\|boot_linux\.sh\|boot_macosx\.sh\|marcuspat/turbo-flow' docs/ .devcontainer/ docker-entrypoint.sh docker-compose.yml Dockerfile README.md 2>/dev/null || true)
          if [ -n "$STALE" ]; then
            echo "FAIL: stale references found in:"
            echo "$STALE"
            exit 1
          fi
          echo "OK no stale references"

  python-adapter:
    name: Python Adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-adapter/python
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra strands --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check turboflow_adapter/ tests/

      - name: Format (ruff format)
        run: uv run ruff format --check turboflow_adapter/ tests/

      - name: Type check (mypy)
        run: uv run mypy turboflow_adapter/ --ignore-missing-imports

      - name: Unit tests
        run: uv run pytest tests/ -v --ignore=tests/test_integration.py

  typescript-adapter:
    name: TypeScript Adapter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-adapter/ts
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [validate, python-adapter, typescript-adapter]
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t turbo-flow:test .

      - name: Smoke test — container starts
        run: |
          docker run --rm -d --name tf-smoke turbo-flow:test sleep 30
          sleep 3
          docker exec tf-smoke bash -c "command -v node && command -v dolt && echo 'OK smoke test'"
          docker stop tf-smoke

  integration-tests:
    name: Integration Tests (Bedrock)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [python-adapter]
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: agent-adapter/python
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra strands --extra dev

      - name: Run integration tests
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          AWS_REGION: us-east-1
          TURBOFLOW_INTEGRATION_TESTS: "1"
        run: uv run pytest tests/test_integration.py -v
